events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Optimisations Performance
    sendfile        on;
    keepalive_timeout  65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Serveur HTTP (Redirection vers HTTPS)
    server {
        listen 80;
        server_name ami.nigelec.ne; # À remplacer par le domaine réel

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Serveur HTTPS
    server {
        listen 443 ssl;
        server_name ami.nigelec.ne;

        # Chemins vers les certificats SSL Nigelec
        ssl_certificate     /etc/nginx/certs/nigelec_fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/nigelec_privkey.pem;

        # Protocoles de Sécurité Renforcée
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # En-têtes de Sécurité (HSTS, etc.)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";

        location / {
            proxy_pass http://app:3000; # Nom du service dans docker-compose
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts pour les longues lectures MDMS
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # Cache pour les assets statiques
        location /assets/ {
            proxy_pass http://app:3000/assets/;
            expires 1y;
            add_header Cache-Control "public, no-transform";
        }
    }
}
